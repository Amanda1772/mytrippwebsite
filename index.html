<div class="container">
  <h2>Add Trip</h2>

  <label for="title">Trip Title</label>
  <input id="title" placeholder="Spring break getaway">

  <label for="location">Location</label>
  <input id="location" placeholder="Miami, FL">

  <label for="startDate">Start Date</label>
  <input id="startDate" type="date">

  <label for="endDate">End Date</label>
  <input id="endDate" type="date">

  <label for="notes">Notes</label>
  <textarea id="notes" placeholder="Hotel, budget, must see spots, packing list"></textarea>

  <div class="actions">
    <button onclick="addTrip()">Add Trip</button>
    <button class="secondary" onclick="clearForm()">Clear</button>
  </div>

  <div class="small">Trips are saved in your browser on this device.</div>
</div>
