<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyTrip Planner</title>
  <!-- If you renamed your CSS file, keep this as styles.css -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="shell">
    <header class="hero">
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <div class="brandName">MyTrip</div>
          <div class="brandTag">Simple trip planning. Clean. Fast. Organized.</div>
        </div>
      </div>

      <div class="heroRight">
        <div class="pill">Web Version</div>
        <div class="pill pillSoft">CRUD Enabled</div>
      </div>
    </header>

    <section class="grid">
      <!-- LEFT CARD: Add or Edit Trip -->
      <div class="card">
        <h2>Add Trip</h2>

        <label for="title">Trip Title</label>
        <input id="title" placeholder="Spring break getaway"/>

        <label for="location">Location</label>
        <input id="location" placeholder="Miami, FL"/>

        <div class="twoCol">
          <div>
            <label for="startDate">Start Date</label>
            <input id="startDate" type="date"/>
          </div>
          <div>
            <label for="endDate">End Date</label>
            <input id="endDate" type="date"/>
          </div>
        </div>

        <label for="notes">Notes</label>
        <textarea id="notes" placeholder="Hotel, budget, must see spots, packing list"></textarea>

        <div class="actions">
          <!-- IMPORTANT: saveTrip handles Add and Edit -->
          <button id="primaryBtn" onclick="saveTrip()">Add Trip</button>
          <button class="secondary" onclick="clearForm()">Clear</button>
        </div>

        <!-- Hidden field used to track when editing -->
        <input type="hidden" id="editingId" value="">

        <div class="small">Trips are saved in your browser on this device.</div>
      </div>

      <!-- RIGHT CARD: Search and List Trips -->
      <div class="card">
        <div class="cardTop">
          <div>
            <h2>Your Trips</h2>
            <div class="small">Search and manage your saved trips.</div>
          </div>
          <div class="count" id="countBadge">0</div>
        </div>

        <label for="search">Search</label>
        <input id="search" placeholder="Search title, location, or notes" onkeyup="searchTrips()"/>

        <ul id="tripList"></ul>
      </div>
    </section>

    <footer class="footer">
      <span>MyTrip Planner • Web Edition</span>
      <span class="dot">•</span>
      <span>Designed for a clean, professional class demo</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
